<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CODE:N 파이썬 스튜디오</title>
    <!-- 라이브러리: 안정적인 절대 경로 사용 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* 1. 기본 UI 및 레이아웃 (VS Code Dark 스타일) */
        :root { --vscode-bg: #1e1e1e; --vscode-side: #252526; --vscode-accent: #007acc; --vscode-text: #cccccc; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: var(--vscode-text); font-family: 'Pretendard', sans-serif; }
        .app-wrapper { display: none; height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        
        /* 4px 두께 투명 다크 그레이 스크롤바 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--vscode-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 커스텀 검은색 비밀번호 모달 (pw-modal) */
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #444; width: 300px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,1); }

        /* 좌측 50px 아이콘 바 */
        .activity-bar { width: 50px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; flex-shrink: 0; }
        /* 250px 아코디언 탐색기 */
        .explorer { width: 250px; background: var(--vscode-side); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* 2. 지문 포맷팅 엔진 스타일 */
        .description-panel { width: 400px; min-width: 150px; padding: 25px; border-right: 1px solid #333; background: #1e1e1e; overflow-y: auto; flex-shrink: 0; box-sizing: border-box; }
        /* '□' 시작: border-left 5px 파란색 + 흰색 굵은 제목 */
        .desc-section-title { font-weight: bold; color: #fff; margin: 25px 0 10px 0; font-size: 16px; border-left: 5px solid var(--vscode-accent); padding-left: 12px; line-height: 1.2; }
        .desc-text { line-height: 1.8; color: #ccc; font-size: 14.5px; margin-bottom: 12px; white-space: pre-wrap; }
        /* 예제 섹션: 회색 박스(example-box) */
        .example-box { background: #2d2d2d; border-radius: 8px; padding: 15px; border: 1px solid #444; color: #eee; font-family: 'Courier New', monospace; margin: 12px 0; font-size: 13.5px; }
        /* 테이블 격자판 스타일 */
        .description-panel table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid #444; background: #252526; }
        .description-panel th, .description-panel td { border: 1px solid #444; padding: 8px; text-align: center; }
        .description-panel th { background: #333; color: white; }
        .bg-yellow { background-color: #f1c40f !important; color: black !important; font-weight: bold; }
        .bg-blue { background-color: #3498db !important; color: white !important; }

        /* 3. 리사이저 (10px 투명 감지 영역 유지) */
        .resizer-h { width: 8px; cursor: col-resize; background: transparent; z-index: 50; margin: 0 -4px; }
        .resizer-h:hover { background: rgba(0, 122, 204, 0.4); }
        .resizer-v { height: 10px; cursor: row-resize; background: transparent; z-index: 60; margin: -5px 0; position: relative; }
        .resizer-v::after { content: ""; position: absolute; width: 100%; height: 10px; top: 0; left: 0; }
        .resizer-v:hover { background: rgba(0, 122, 204, 0.4); }

        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 200px; position: relative; overflow: hidden; }
        #editor-container { flex: 1; width: 100%; }
        .console-area { height: 200px; min-height: 35px; background: #000; padding: 8px 15px; border-top: 1px solid #333; overflow-y: auto; flex-shrink: 0; }
        #output { color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 14px; margin-top: 5px; }
        
        .btn-run { position: absolute; right: 25px; top: 15px; z-index: 100; background: #28a745; color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .main-cat-header { padding: 12px 15px; font-size: 12px; font-weight: bold; color: #fff; background: #37373d; cursor: pointer; border-bottom: 1px solid #222; }
        .sub-cat-header { padding: 10px 15px 10px 30px; font-size: 12px; font-weight: bold; color: #999; background: #2d2d2d; cursor: pointer; border-bottom: 1px solid #222; }
        .prob-item { padding: 8px 15px 8px 50px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #282828; }
        .prob-item.solved { color: #28a745; font-weight: bold; }
        .admin-input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 10px; width: 100%; border-radius: 4px; text-align: center; }
        .floating-panel { display: none; position: fixed; top: 20px; left: 60px; right: 20px; bottom: 20px; background: #252526; border: 1px solid #444; border-radius: 12px; z-index: 1000; padding: 25px; overflow: hidden; }
    </style>
</head>
<body onselectstart="return !isDragging">

<div id="loader" class="overlay"><div class="spinner"></div><b id="loader-msg">시스템 로딩 중...</b></div>

<!-- 관리자 인증 모달 -->
<div id="pw-modal" class="custom-modal">
    <div class="modal-box">
        <h3 style="color:white; margin-top:0;">관리자 인증</h3>
        <input type="password" id="pw-input" class="admin-input" style="font-size:20px; letter-spacing:5px;" placeholder="····" onkeypress="if(event.keyCode==13) checkPw()">
        <p style="color:#666; font-size:11px; margin-top:10px;">Enter를 눌러 확인 (취소는 창 밖 클릭)</p>
    </div>
</div>

<div id="login-screen" class="overlay" style="display:none;">
    <div style="background:#252526; padding:40px; border-radius:15px; width:300px; text-align:center; border:1px solid #444;">
        <h2 style="color:white; margin-bottom:20px;">코드:앤 파이썬 스튜디오</h2>
        <input type="text" id="user-name" class="admin-input" placeholder="이름 입력" onkeypress="if(event.keyCode==13) login()">
        <button onclick="login()" style="width:100%; background:#007acc; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; margin-top:15px;">시작하기</button>
    </div>
</div>

<div class="app-wrapper" id="main-app">
    <div class="activity-bar">
        <div style="text-align: center;"><i class="fas fa-code" style="color:white; font-size: 22px; margin-bottom: 25px;"></i><div id="user-display" style="font-size: 10px; color: #28a745; font-weight: bold; writing-mode: vertical-lr;">USER</div></div>
        <div>
            <div id="sync-icon"><i class="fas fa-check-circle" style="color:#28a745; margin-bottom: 25px;"></i></div>
            <div onclick="askPw('dashboard')" title="성취도 대시보드"><i class="fas fa-chart-pie" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="logout()" title="로그아웃"><i class="fas fa-sign-out-alt" style="color:#555; cursor:pointer;"></i></div>
        </div>
    </div>
    <div class="explorer">
        <div style="padding: 15px 20px; font-size: 11px; color: #888; font-weight: bold;">EXPLORER</div>
        <div id="accordion-root" style="flex: 1; overflow-y: auto;"></div>
        <div id="progress-stats" style="padding: 15px 20px; font-size: 12px; color: #28a745; border-top: 1px solid #333; font-weight:bold;">성취도: 0%</div>
    </div>
    <div class="main-content">
        <div class="description-panel" id="panel-desc">
            <h2 id="prob-title" style="margin: 0 0 20px 0; color: white;">문제를 선택하세요</h2>
            <div id="prob-desc-container"></div>
        </div>
        <div class="resizer-h" id="resizer-h"></div>
        <div class="editor-section">
            <button id="run-btn" class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
            <div id="editor-container"></div>
            <div class="resizer-v" id="resizer-v"></div>
            <div class="console-area" id="panel-terminal">
                <div style="color: #666; font-size: 10px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 3px;">TERMINAL</div>
                <div id="output">코드를 실행하세요.</div>
            </div>
        </div>
    </div>
</div>

<div id="dashboard-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>학생별 성취도</h3><button onclick="closePanels()">닫기</button></div>
    <div style="flex:1; overflow-y:auto;"><table style="width:100%; border-collapse:collapse; color:#ccc;"><tbody id="stats-body"></tbody></table></div>
</div>

<script>
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbxECzN-NGJWsrx466aoGcodQICqQY2UeNVBJ4_CR8gyxi2TerpznaZAX7xCLw530Yk1/exec";
    const GITHUB_USER = "kssim00", GITHUB_REPO = "python-test-V2", ADMIN_PW = "1234";

    let problems = [], solvedIds = [], currentIdx = -1, pyodide, editor, isDragging = false;
    let currentUser = localStorage.getItem('coden_user_v81') || ""; 
    let openMainCats = [], openSubCats = [], targetMode = "";

    // [기능 2] 지문 스마트 포맷팅 엔진 구현
    function smartFormatDesc(text) {
        if (!text) return "";
        let html = "", isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim();
            if (!t) return;
            if (t.startsWith('<table') || t.includes('</table>') || t.startsWith('<svg')) { html += t; isExample = false; } 
            else if (t.startsWith('□')) {
                isExample = t.includes('예제') || t.includes('예시');
                html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`;
            } 
            else if (isExample) { html += `<div class="example-box">${t}</div>`; } 
            else { html += `<div class="desc-text">${t}</div>`; }
        });
        return html;
    }

    async function initApp() {
        if(!currentUser) { document.getElementById('loader').style.display='none'; document.getElementById('login-screen').style.display='flex'; return; }
        
        try {
            // 1. 데이터 로딩
            const filesRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
            const files = await filesRes.json();
            const jsonUrls = files.filter(f => f.name.endsWith('.json')).map(f => f.download_url);
            let combined = [];
            for(let url of jsonUrls) { combined = [...combined, ...(await (await fetch(url)).json())]; }
            problems = combined.map((p, i) => ({ id: 80000 + i, ...p }));
            const sRes = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(currentUser)}`);
            solvedIds = (await sRes.json()).map(id => parseInt(id));

            // 2. 모나코 에디터 절대 경로 로딩 (이 부분이 멈춤 현상 해결 핵심)
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
            require(['vs/editor/editor.main'], async function() {
                editor = monaco.editor.create(document.getElementById('editor-container'), { 
                    value: "", language: 'python', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }
                });
                
                // [기능] 자동 저장
                editor.onDidChangeModelContent(() => { 
                    if (currentIdx !== -1) localStorage.setItem(`draft_${currentUser}_${currentIdx}`, editor.getValue()); 
                });

                pyodide = await loadPyodide();
                document.getElementById('loader').style.display = 'none'; 
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                
                renderList(); 
                initResizing();
                
                // [기능] 이어 풀기 (안 푼 첫 문제로 자동 이동)
                const target = problems.find(p => !solvedIds.includes(p.id)) || problems[0];
                if(target) loadProblem(target.id);
            });
        } catch(e) { console.error(e); }
    }

    function initResizing() {
        const h = document.getElementById('resizer-h'), v = document.getElementById('resizer-v'), pD = document.getElementById('panel-desc'), pT = document.getElementById('panel-terminal');
        h.onmousedown = (e) => { 
            isDragging = true; 
            const moveH = (e) => {
                let w = e.clientX - 300; 
                if (w > 150 && w < window.innerWidth-400) { pD.style.width = w+"px"; editor.layout(); }
            };
            const upH = () => { isDragging = false; window.removeEventListener('mousemove', moveH); };
            window.addEventListener('mousemove', moveH); window.addEventListener('mouseup', upH);
        };
        v.onmousedown = (e) => { 
            isDragging = true; 
            const moveV = (e) => {
                let h = window.innerHeight - e.clientY;
                if (h > 35 && h < window.innerHeight-150) { pT.style.height = h+"px"; editor.layout(); }
            };
            const upV = () => { isDragging = false; window.removeEventListener('mousemove', moveV); };
            window.addEventListener('mousemove', moveV); window.addEventListener('mouseup', upV);
        };
    }

    function renderList() {
        const root = document.getElementById('accordion-root'); root.innerHTML = "";
        const tree = {};
        problems.forEach(p => { if(!tree[p.mainCat]) tree[p.mainCat] = {}; if(!tree[p.mainCat][p.subCat]) tree[p.mainCat][p.subCat] = []; tree[p.mainCat][p.subCat].push(p); });
        for(const m in tree) {
            let mDiv = document.createElement('div'); mDiv.className=`main-cat-header`; mDiv.innerText=m;
            mDiv.onclick=()=>{ openMainCats.includes(m)?openMainCats=openMainCats.filter(x=>x!=m):openMainCats.push(m); renderList(); };
            root.appendChild(mDiv);
            if(openMainCats.includes(m)) {
                for(const s in tree[m]) {
                    let sDiv = document.createElement('div'); sDiv.className=`sub-cat-header`; sDiv.innerText=s;
                    sDiv.onclick=()=>{ openSubCats.includes(s)?openSubCats=openSubCats.filter(x=>x!=s):openSubCats.push(s); renderList(); };
                    root.appendChild(sDiv);
                    if(openSubCats.includes(s)) {
                        tree[m][s].forEach(p => {
                            let pDiv = document.createElement('div'); 
                            pDiv.className=`prob-item ${currentIdx==p.id?'active':''} ${solvedIds.includes(p.id)?'solved':''}`;
                            pDiv.innerText = (solvedIds.includes(p.id)?'✔ ':'') + p.title; 
                            pDiv.onclick=()=>loadProblem(p.id); root.appendChild(pDiv);
                        });
                    }
                }
            }
        }
        document.getElementById('progress-stats').innerText = `성취도: ${problems.length?Math.floor((solvedIds.length/problems.length)*100):0}% (${solvedIds.length}/${problems.length})`;
    }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('output').innerText = "코드를 실행하세요."; // 터미널 초기화
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormatDesc(p.desc);
        editor.setValue(localStorage.getItem(`draft_${currentUser}_${id}`) || p.initial || "");
    }

    async function runCode() {
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").trim();
            document.getElementById('output').innerText = res;
            if(res === p.expected.toString().trim()) {
                document.getElementById('output').innerHTML += "\n\n<b style='color: yellow;'>🎉 정답입니다!</b>";
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message; }
    }

    // [기능 4] 관리자 인증 및 리포트
    function askPw(mode) { targetMode = mode; document.getElementById('pw-modal').style.display = 'flex'; document.getElementById('pw-input').focus(); }
    function checkPw() {
        const i = document.getElementById('pw-input');
        if(i.value === ADMIN_PW) { 
            i.value = ""; closePanels(); 
            if(targetMode === 'dashboard') showStats();
        } else { i.value = ""; }
    }

    async function showStats() {
        document.getElementById('dashboard-panel').style.display = 'block';
        const body = document.getElementById('stats-body'); body.innerHTML = "조회 중...";
        const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
        const data = await res.json();
        const stats = {}; data.forEach(row => { if(!stats[row[1]]) stats[row[1]] = new Set(); stats[row[1]].add(row[2]); });
        body.innerHTML = "";
        Object.keys(stats).forEach(n => {
            const cnt = stats[n].size;
            body.innerHTML += `<tr><td style="padding:10px;">${n}</td><td>${Math.floor((cnt/problems.length)*100)}%</td><td><i class="fas fa-file-invoice" onclick="window.open('', '_blank').document.write('<h1>${n} 성취도 리포트</h1>')"></i></td></tr>`;
        });
    }

    function login() { const n = document.getElementById('user-name').value.trim(); if(n) { localStorage.setItem('coden_user_v81', n); location.reload(); } }
    function logout() { localStorage.removeItem('coden_user_v81'); location.reload(); }
    function closePanels() { document.querySelectorAll('.custom-modal, .floating-panel').forEach(p=>p.style.display='none'); }

    initApp();
</script>
</body>
</html>
