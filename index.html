<head>

    <style>

        .modal-box { background: #252526; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 320px; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,1); }

    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>성취도 대시보드</h3><button onclick="closePanels()">닫기</button></div>
    <div style="flex:1; overflow-y:auto;"><table class="master-table"><thead><tr style="background:#333;"><th>학생명</th><th>진척률</th><th>리포트</th></tr></thead><tbody id="stats-body"></tbody></table></div>
</div>

<script>
    // [Cloud URL 및 비밀번호 업데이트]
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbyG6673JHkbiPuKOicUs44Q0vzpI-GA4xtcipoUVldFMnNpTAntEmZ7R1QEKjSlKkgT/exec";
    const GITHUB_USER = "kssim00", GITHUB_REPO = "python-test", ADMIN_PW = "258799";

    let problems = [], solvedIds = [], currentIdx = -1, pyodide, editor, isDragging = false;
    let currentUser = "", openMainCats = [], openSubCats = [], targetMode = "", allStatsData = [];
    let currentFontSize = 16;

    const getSaveKey = (id) => `code_save_${currentUser}_${id}`;

async function runCode() {
        if(!pyodide) return;
        const p = problems.find(x => x.id === currentIdx);
        try {
            // 1. Python 표준 출력을 가로채기 위한 설정
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            
            // 2. 에디터에 작성된 코드 실행
            await pyodide.runPythonAsync(editor.getValue());
            
            // 3. 실행 결과 가져오기
            const rawOutput = pyodide.runPython("sys.stdout.getvalue()");
            document.getElementById('output').innerText = rawOutput;

            // 4. 정답 비교 로직 (개선됨)
            // JSON에 적힌 정답 숫자 (예: "13")
            const expectedValue = p.expected.toString().trim();
            
            // 출력된 전체 텍스트에서 숫자만 추출 (예: "반환 값은 13 입니다" -> ["13"])
            const numbersInOutput = rawOutput.match(/-?\d+/g); 
            
            // 출력된 숫자들 중에 정답 숫자가 포함되어 있는지 확인
            const isCorrect = numbersInOutput && numbersInOutput.includes(expectedValue);

            if(isCorrect) {
                document.getElementById('output').innerHTML += "\n\n<b style='color: yellow;'>🎉 정답입니다!</b>";
                // 서버에 정답 기록 저장
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                
                if(!solvedIds.includes(p.id)) { 
                    solvedIds.push(p.id); 
                    renderList(); 
                }
                // 축하 효과
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                document.getElementById('output').innerHTML += "\n\n<b style='color: #ff4d4d;'>❌ 오답입니다. 다시 시도해보세요!</b>";
            }
        } catch(e) { 
            // 문법 에러 등이 발생한 경우 출력
            document.getElementById('output').innerText = "에러가 발생했습니다:\n" + e.message; 
        }
    }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('output').innerText = "코드를 실행하세요.";
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormatDesc(p.desc);
        const savedCode = localStorage.getItem(getSaveKey(id));
        editor.setValue(savedCode || p.initial || "");
    }

    async function runCode() {
        if(!pyodide) return;
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").replace(/\r/g, "").trim();
            const expected = p.expected.toString().replace(/\r/g, "").trim();
            document.getElementById('output').innerText = res;
            if(res === expected) {
                document.getElementById('output').innerHTML += "\n\n<b style='color: yellow;'>🎉 정답입니다!</b>";
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                document.getElementById('output').innerHTML += "\n\n<b style='color: #ff4d4d;'>❌ 오답입니다. 다시 시도해보세요!</b>";
            }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message; }
    }

    function askPw(mode) { targetMode = mode; document.getElementById('pw-input').value = ""; document.getElementById('pw-modal').style.display = 'flex'; document.getElementById('pw-input').focus(); }
    function checkPw() { if(document.getElementById('pw-input').value === ADMIN_PW) { document.getElementById('pw-input').value = ""; closePanels(); if(targetMode === 'dashboard') showStats(); else { document.getElementById('admin-panel').style.display='block'; renderSortManager(); } } else { document.getElementById('pw-input').value = ""; alert("불일치"); } }
    
    async function showStats() {
        document.getElementById('dashboard-panel').style.display = 'block';
        const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
        allStatsData = await res.json();
        const stats = {}; allStatsData.forEach(row => { if(!stats[row[1]]) stats[row[1]] = new Set(); stats[row[1]].add(row[2]); });
        const body = document.getElementById('stats-body'); body.innerHTML = "";
        Object.keys(stats).forEach(n => { body.innerHTML += `<tr><td>${n}</td><td>${Math.floor((stats[n].size/problems.length)*100)}%</td><td><i class="fas fa-chart-pie" style="cursor:pointer; color:#007acc;" onclick="openDetailReport('${n}')"></i></td></tr>`; });
    }
    
    function openDetailReport(name) {
        document.getElementById('report-view').style.display = 'flex';
        document.getElementById('report-user-name').innerText = name;
        const mySolved = allStatsData.filter(r => r[1] === name).map(r => parseInt(r[2]));
        const percent = Math.floor((mySolved.length / problems.length) * 100);
        document.getElementById('report-total-percent').innerText = percent + "%";
        document.getElementById('report-total-bar').style.width = percent + "%";
        document.getElementById('report-total-count').innerText = `${mySolved.length} / ${problems.length} Solved`;
        let html = "";
        problems.forEach(p => {
            const solved = mySolved.includes(p.id);
            html += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><span style="font-size:11px; color:${solved?'#ccc':'#555'};">${p.title}</span><span class="badge ${solved?'badge-solved':'badge-pending'}">${solved?'완료':'미완'}</span></div>`;
        });
        document.getElementById('report-category-stats').innerHTML = html;
    }

    function renderSortManager() {
        const b = document.getElementById('sort-body'); b.innerHTML = "";
        problems.forEach((p, i) => {
            b.innerHTML += `<tr><td><input type='checkbox' class='p-check' data-idx='${i}'></td><td style='color:#777;'>${p.subCat}</td><td style='text-align:left;'>${p.title}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},-1)'>↑</button><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},1)'>↓</button></td></tr>`;
        });
    }

    function renderCatManager() {
        const b = document.getElementById('cat-sort-body'); b.innerHTML = "";
        const catPairs = [];
        problems.forEach(p => {
            if(!catPairs.find(x => x.m === p.mainCat && x.s === p.subCat)) {
                catPairs.push({ m: p.mainCat, s: p.subCat });
            }
        });

        catPairs.forEach((pair, i) => {
            b.innerHTML += `<tr>
                <td style='text-align:left; font-size:11px;'>
                    <span style="color:#888;">${pair.m} > </span>
                    <span style="color:#fff; font-weight:bold;">${pair.s}</span>
                </td>
                <td>
                    <button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${pair.m}", "${pair.s}", -1)'>▲</button>
                    <button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${pair.m}", "${pair.s}", 1)'>▼</button>
                    <button class='btn-mini' style='background:#8b0000; margin-left:10px;' onclick='resetCategoryCode("${pair.m}", "${pair.s}")'><i class="fas fa-trash-alt"></i> 초기화</button>
                </td>
            </tr>`;
        });
    }

    function moveProb(idx, dir) { let t = idx + dir; if (t < 0 || t >= problems.length) return; let tmp = problems[idx]; problems[idx] = problems[t]; problems[t] = tmp; renderSortManager(); renderList(); }
    
    function moveCategory(mName, sName, dir) { 
        const catPairs = [];
        problems.forEach(p => {
            if(!catPairs.find(x => x.m === p.mainCat && x.s === p.subCat)) {
                catPairs.push({ m: p.mainCat, s: p.subCat });
            }
        });
        const cur = catPairs.findIndex(x => x.m === mName && x.s === sName);
        const tar = cur + dir; 
        if(tar < 0 || tar >= catPairs.length) return; 
        
        const tmp = catPairs[cur];
        catPairs[cur] = catPairs[tar];
        catPairs[tar] = tmp;

        let nO = []; 
        catPairs.forEach(pair => { 
            nO = [...nO, ...problems.filter(p => p.mainCat === pair.m && p.subCat === pair.s)]; 
        }); 
        problems = nO; 
        renderCatManager(); 
        renderList(); 
    }

    function toggleAllChecks() { const cs = document.querySelectorAll('.p-check'); const all = Array.from(cs).every(c => c.checked); cs.forEach(c => c.checked = !all); }
    function deleteSelected() { const cs = document.querySelectorAll('.p-check:checked'); if(!confirm("삭제?")) return; const ids = Array.from(cs).map(c => parseInt(c.dataset.idx)).sort((a,b)=>b-a); ids.forEach(i => problems.splice(i, 1)); renderSortManager(); renderList(); }
    function switchAdminTab(t) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); if(t==='prob') { document.getElementById('tab-prob').classList.add('active'); document.getElementById('admin-prob-view').style.display='block'; document.getElementById('admin-cat-view').style.display='none'; renderSortManager(); } else { document.getElementById('tab-cat').classList.add('active'); document.getElementById('admin-prob-view').style.display='none'; document.getElementById('admin-cat-view').style.display='block'; renderCatManager(); } }
    function resetDataAndSync() { if(confirm("초기화?")) { refreshData(); closePanels(); } }
    function applyTestJson() { try { const d = JSON.parse(document.getElementById('test-json-input').value); problems = [...d.map((p,i)=>({id:99000+i,...p})), ...problems]; renderList(); alert("적용됨"); closePanels(); } catch(e){alert("JSON 오류");} }
    function exportJson() { const data = JSON.stringify(problems.map(({id, ...rest})=>rest), null, 2); document.getElementById('test-json-input').value = data; alert("추출됨"); }
    function closePanels() { document.querySelectorAll('.custom-modal, .floating-panel, #report-view').forEach(p=>p.style.display='none'); document.getElementById('pw-input').value = ""; }
    
    function smartFormatDesc(text) {
        if (!text) return "";
        let html = "", isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim();
            if (/<table|<tr|<td|<th|<\/table|<\/tr|<\/td|<\/th>/.test(t)) { html += t; isExample = false; }
            else if (t.startsWith('□')) { isExample = t.includes('예제') || t.includes('예시'); html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`; }
            else if (isExample) { html += `<div class="example-box">${t}</div>`; }
            else if (t) { html += `<div class="desc-text">${t}</div>`; }
        });
        return html;
    }

    initApp();
</script>
</body>
</html>
