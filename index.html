<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코드:앤 파이썬 스튜디오 (v9.9 - Pro Edition)</title>
    <!-- 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* 1. 기본 UI 및 레이아웃 */
        :root { --vscode-bg: #1e1e1e; --vscode-side: #252526; --vscode-accent: #007acc; --vscode-text: #cccccc; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: var(--vscode-text); font-family: 'Pretendard', sans-serif; }
        .app-wrapper { display: none; height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--vscode-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #252526; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 320px; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,1); }

        .activity-bar { width: 50px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; flex-shrink: 0; }
        .explorer { width: 250px; min-width: 100px; background: var(--vscode-side); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        .description-panel { width: 400px; min-width: 150px; padding: 25px; border-right: 1px solid #333; background: #1e1e1e; overflow-y: auto; flex-shrink: 0; box-sizing: border-box; }
        .desc-section-title { font-weight: bold; color: #fff; margin: 25px 0 10px 0; font-size: 16px; border-left: 5px solid var(--vscode-accent); padding-left: 12px; line-height: 1.2; }
        .desc-text { line-height: 1.8; color: #ccc; font-size: 14.5px; margin-bottom: 12px; white-space: pre-wrap; }
        .example-box { background: #2d2d2d; border-radius: 8px; padding: 15px; border: 1px solid #444; color: #eee; font-family: 'Courier New', monospace; margin: 12px 0; }
        
        .description-panel table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid #444; background: #252526; }
        .description-panel th, .description-panel td { border: 1px solid #444; padding: 10px; text-align: center; font-size: 14px; }
        .bg-yellow { background-color: #f1c40f !important; color: black !important; font-weight: bold; }
        .bg-blue { background-color: #3498db !important; color: white !important; }

        /* 리사이저 스타일 */
        .resizer-h { width: 8px; cursor: col-resize; background: transparent; z-index: 50; margin: 0 -4px; }
        .resizer-h:hover { background: rgba(0, 122, 204, 0.4); }
        .resizer-v { height: 10px; cursor: row-resize; background: transparent; z-index: 60; margin: -5px 0; position: relative; }
        .resizer-v:hover { background: rgba(0, 122, 204, 0.4); }

        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 200px; position: relative; overflow: hidden; }
        #editor-container { flex: 1; width: 100%; }
        .console-area { height: 200px; min-height: 35px; background: #000; padding: 8px 15px; border-top: 1px solid #333; overflow-y: auto; flex-shrink: 0; }
        #output { color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 14px; margin-top: 5px; }
        
        .btn-run { position: absolute; right: 25px; top: 15px; z-index: 100; background: #28a745; color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .main-cat-header { padding: 12px 15px; font-size: 12px; font-weight: bold; color: #fff; background: #37373d; cursor: pointer; border-bottom: 1px solid #222; }
        .sub-cat-header { padding: 10px 15px 10px 30px; font-size: 12px; font-weight: bold; color: #999; background: #2d2d2d; cursor: pointer; border-bottom: 1px solid #222; }
        .prob-item { padding: 8px 15px 8px 50px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #282828; }
        
        .prob-item.active { color: #ffffff !important; background-color: #094771 !important; font-weight: bold; }
        .prob-item.solved { color: #28a745; font-weight: bold; }
        .prob-item.solved.active { background-color: #094771 !important; color: #28a745 !important; }

        /* 관리자 패널 스타일 */
        .floating-panel { display: none; position: fixed; top: 20px; left: 60px; right: 20px; bottom: 20px; background: #252526; border: 1px solid #444; border-radius: 12px; z-index: 1000; padding: 25px; overflow: hidden; }
        .admin-flex { display: flex; gap: 20px; height: calc(100% - 60px); }
        .admin-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #111; padding: 15px; border-radius: 8px; }
        .master-table { width: 100%; border-collapse: collapse; color: #ddd; font-size: 12px; }
        .master-table th, .master-table td { padding: 8px; border: 1px solid #333; text-align: center; }
        .admin-input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 10px; width: 100%; border-radius: 4px; margin-bottom: 10px; }
        .btn-mini { padding: 4px 6px; border-radius: 3px; border: none; cursor: pointer; font-size: 10px; color: white; margin: 0 2px; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; font-weight: bold; font-size: 13px; padding-bottom: 8px; margin-right: 10px; }
        .tab-btn.active { color: var(--vscode-accent); border-bottom: 2px solid var(--vscode-accent); }

        /* 리포트 전용 스타일 */
        #report-view { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:400px; height:500px; background:#252526; border:1px solid #444; border-radius:12px; z-index:11000; padding:20px; flex-direction:column; }
    </style>
</head>

</div>

<div id="report-view">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px;">
        <h4 id="report-user-name" style="margin:0; color:#28a745;">학생 리포트</h4>

    </div>

<script>
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbxECzN-NGJWsrx466aoGcodQICqQY2UeNVBJ4_CR8gyxi2TerpznaZAX7xCLw530Yk1/exec";
    const GITHUB_USER = "kssim00", GITHUB_REPO = "python-test-V2", ADMIN_PW = "1234";

    let problems = [], solvedIds = [], currentIdx = -1, pyodide, editor, isDragging = false;
    let currentUser = "";
    let openMainCats = [], openSubCats = [], targetMode = "";
    let allStatsData = []; // 리포트 조회를 위해 전체 통계 데이터 저장

    async function initApp() {
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], async function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), { 
                value: "", language: 'python', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }
            });
            try {
                pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" });
            } catch(e) { console.error(e); }
            document.getElementById('loader').style.display='none';
        });
    }

    async function refreshData() {
        const icon = document.getElementById('explorer-refresh-icon');
        if(icon) icon.classList.add('fa-spin');
        try {
            const sheetRes = await fetch(`${MASTER_CLOUD_URL}?action=getProblems`);
            const sheetProbs = await sheetRes.json();
            const filesRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
            const files = await filesRes.json();
            const jsonUrls = files.filter(f => f.name.endsWith('.json')).map(f => f.download_url);
            let githubProbs = [];
            for(let url of jsonUrls) { githubProbs = [...githubProbs, ...(await (await fetch(url)).json())]; }
            problems = [...sheetProbs, ...githubProbs].map((p, i) => ({ id: 80000 + i, ...p }));
            const sRes = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(currentUser)}`);
            solvedIds = (await sRes.json()).map(id => parseInt(id));
            renderList();
        } catch(e) { alert("동기화 오류"); } finally { if(icon) icon.classList.remove('fa-spin'); }
    }

    async function login() {
        const n = document.getElementById('user-name').value.trim();
        if(!n) return;
        currentUser = n;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('loader').style.display='flex';
        try {
            await refreshData();
            document.getElementById('loader').style.display = 'none'; 
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('user-display').innerText = currentUser;
            if(problems.length > 0) loadProblem(problems[0].id);
            initResizing();
        } catch(e) { console.error(e); }
    }

    // 리사이징 기능 (탐색기 포함)
    function initResizing() {
        const hExp = document.getElementById('resizer-explorer'), 
              hDesc = document.getElementById('resizer-h'), 
              vTerm = document.getElementById('resizer-v'),
              pExp = document.getElementById('panel-explorer'),
              pDesc = document.getElementById('panel-desc'),
              pTerm = document.getElementById('panel-terminal');

        // 탐색기 너비 조절
        hExp.onmousedown = (e) => {
            isDragging = true;
            const moveExp = (ev) => {
                let w = ev.clientX - 50; // 사이드바 50px 제외
                if (w > 100 && w < 600) { pExp.style.width = w + "px"; editor.layout(); }
            };
            const upExp = () => { isDragging = false; window.removeEventListener('mousemove', moveExp); };
            window.addEventListener('mousemove', moveExp); window.addEventListener('mouseup', upExp);
        };

        // 지문 영역 너비 조절
        hDesc.onmousedown = (e) => { 
            isDragging = true; 
            const moveH = (ev) => {
                let w = ev.clientX - pExp.offsetWidth - 58; 
                if (w > 150 && w < window.innerWidth - 400) { pDesc.style.width = w + "px"; editor.layout(); }
            };
            const upH = () => { isDragging = false; window.removeEventListener('mousemove', moveH); };
            window.addEventListener('mousemove', moveH); window.addEventListener('mouseup', upH);
        };

        // 터미널 높이 조절
        vTerm.onmousedown = (e) => { 
            isDragging = true; 
            const moveV = (ev) => {
                let h = window.innerHeight - ev.clientY;
                if (h > 35 && h < window.innerHeight - 150) { pTerm.style.height = h + "px"; editor.layout(); }
            };
            const upV = () => { isDragging = false; window.removeEventListener('mousemove', moveV); };
            window.addEventListener('mousemove', moveV); window.addEventListener('mouseup', upV);
        };
    }

    function renderList() {
        const root = document.getElementById('accordion-root'); root.innerHTML = "";
        const tree = {};
        problems.forEach(p => { 
            if(!tree[p.mainCat]) tree[p.mainCat] = {}; 
            if(!tree[p.mainCat][p.subCat]) tree[p.mainCat][p.subCat] = []; 
            tree[p.mainCat][p.subCat].push(p); 
        });
        for(const m in tree) {
            let mDiv = document.createElement('div'); mDiv.className=`main-cat-header`; mDiv.innerText=m;
            mDiv.onclick=()=>{ openMainCats.includes(m)?openMainCats=openMainCats.filter(x=>x!=m):openMainCats.push(m); renderList(); };
            root.appendChild(mDiv);
            if(openMainCats.includes(m)) {
                for(const s in tree[m]) {
                    let sDiv = document.createElement('div'); sDiv.className=`sub-cat-header`; sDiv.innerText=s;
                    sDiv.onclick=()=>{ openSubCats.includes(s)?openSubCats=openSubCats.filter(x=>x!=s):openSubCats.push(s); renderList(); };
                    root.appendChild(sDiv);
                    if(openSubCats.includes(s)) {
                        tree[m][s].forEach(p => {
                            let pDiv = document.createElement('div'); 
                            pDiv.className=`prob-item ${currentIdx==p.id?'active':''} ${solvedIds.includes(p.id)?'solved':''}`;
                            pDiv.innerText = (solvedIds.includes(p.id)?'✔ ':'') + p.title; 
                            pDiv.onclick=()=>loadProblem(p.id); root.appendChild(pDiv);
                        });
                    }
                }
            }
        }
        document.getElementById('progress-stats').innerText = `성취도: ${problems.length?Math.floor((solvedIds.length/problems.length)*100):0}% (${solvedIds.length}/${problems.length})`;
    }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('output').innerText = "코드를 실행하세요.";
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormatDesc(p.desc);
        editor.setValue(p.initial || "");
    }

    async function runCode() {
        if(!pyodide) return;
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").trim();
            document.getElementById('output').innerText = res;
            if(res === p.expected.toString().trim()) {
                document.getElementById('output').innerHTML += "\n\n<b style='color: yellow;'>🎉 정답입니다!</b>";
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message; }
    }

    function askPw(mode) { targetMode = mode; document.getElementById('pw-modal').style.display = 'flex'; document.getElementById('pw-input').focus(); }
    function checkPw() {
        const i = document.getElementById('pw-input');
        if(i.value === ADMIN_PW) { 
            i.value = ""; closePanels(); 
            if(targetMode === 'dashboard') showStats();
            else { document.getElementById('admin-panel').style.display = 'block'; renderSortManager(); }
        } else { i.value = ""; alert("비밀번호 오류"); }
    }

    // 대시보드 통계 조회
    async function showStats() {
        document.getElementById('dashboard-panel').style.display = 'block';
        const body = document.getElementById('stats-body'); body.innerHTML = "조회 중...";
        const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
        allStatsData = await res.json();
        const stats = {}; 
        allStatsData.forEach(row => { 
            if(!stats[row[1]]) stats[row[1]] = new Set(); 
            stats[row[1]].add(row[2]); 
        });
        body.innerHTML = "";
        Object.keys(stats).forEach(n => {
            const cnt = stats[n].size;
            body.innerHTML += `<tr><td>${n}</td><td>${Math.floor((cnt/problems.length)*100)}%</td><td><i class="fas fa-file-invoice" style="cursor:pointer; color:#007acc;" onclick="openDetailReport('${n}')"></i></td></tr>`;
        });
    }

    // 상세 리포트 생성 및 표시
    function openDetailReport(name) {
        const reportModal = document.getElementById('report-view');
        const reportContent = document.getElementById('report-content');
        const reportUser = document.getElementById('report-user-name');
        
        reportUser.innerText = `[${name}] 학습 리포트`;
        reportModal.style.display = 'flex';
        
        // 해당 학생이 푼 문제 ID 추출
        const studentSolvedIds = allStatsData.filter(r => r[1] === name).map(r => parseInt(r[2]));
        
        let html = `<div style="margin-bottom:15px; background:#111; padding:10px; border-radius:5px;"><b>총 완료: ${studentSolvedIds.length} / ${problems.length}</b></div>`;
        
        problems.forEach(p => {
            const isSolved = studentSolvedIds.includes(p.id);
            html += `<div style="padding:5px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                        <span>${p.title}</span>
                        <span style="color:${isSolved?'#28a745':'#555'}">${isSolved?'완료':'미완료'}</span>
                     </div>`;
        });
        
        reportContent.innerHTML = html;
    }

    function renderSortManager() {
        const b = document.getElementById('sort-body'); b.innerHTML = "";
        problems.forEach((p, i) => {
            b.innerHTML += `<tr><td><input type='checkbox' class='p-check' data-idx='${i}'></td><td style='color:#777;'>${p.subCat}</td><td style='text-align:left;'>${p.title}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},-1)'>↑</button><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},1)'>↓</button></td></tr>`;
        });
    }

    function renderCatManager() {
        const b = document.getElementById('cat-sort-body'); b.innerHTML = "";
        const cats = [...new Set(problems.map(p => p.subCat))];
        cats.forEach((c, i) => {
            b.innerHTML += `<tr><td style='text-align:left; font-weight:bold;'>${c}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${c}",-1)'>▲ 위로</button><button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${c}",1)'>▼ 아래로</button></td></tr>`;
        });
    }

    function moveProb(idx, dir) { 
        let t = idx + dir; if (t < 0 || t >= problems.length) return; 
        let tmp = problems[idx]; problems[idx] = problems[t]; problems[t] = tmp; 
        updateAll(); 
    }

    function moveCategory(name, dir) { 
        const cats = [...new Set(problems.map(p => p.subCat))]; const cur = cats.indexOf(name); const tar = cur + dir;
        if(tar < 0 || tar >= cats.length) return;
        cats.splice(cur, 1); cats.splice(tar, 0, name);
        let nO = []; cats.forEach(s => { nO = [...nO, ...problems.filter(p => p.subCat === s)]; });
        problems = nO; updateAll(); renderCatManager();
    }

    function toggleAllChecks() { const cs = document.querySelectorAll('.p-check'); const all = Array.from(cs).every(c => c.checked); cs.forEach(c => c.checked = !all); }
    function deleteSelected() { const cs = document.querySelectorAll('.p-check:checked'); if(!confirm("삭제?")) return; const ids = Array.from(cs).map(c => parseInt(c.dataset.idx)).sort((a,b)=>b-a); ids.forEach(i => problems.splice(i, 1)); updateAll(); }
    function switchAdminTab(t) { 
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        if(t==='prob') { document.getElementById('tab-prob').classList.add('active'); document.getElementById('admin-prob-view').style.display='block'; document.getElementById('admin-cat-view').style.display='none'; renderSortManager(); }
        else { document.getElementById('tab-cat').classList.add('active'); document.getElementById('admin-prob-view').style.display='none'; document.getElementById('admin-cat-view').style.display='block'; renderCatManager(); }
    }
    function updateAll() { renderSortManager(); renderList(); }
    function resetDataAndSync() { if(confirm("초기화?")) { refreshData(); closePanels(); } }
    function applyTestJson() { try { const d = JSON.parse(document.getElementById('test-json-input').value); problems = [...d.map((p,i)=>({id:99000+i,...p})), ...problems]; renderList(); alert("적용됨"); closePanels(); } catch(e){alert("JSON 오류");} }
    function exportJson() { const data = JSON.stringify(problems.map(({id, ...rest})=>rest), null, 2); document.getElementById('test-json-input').value = data; alert("추출됨"); }
    function closePanels() { 
        document.querySelectorAll('.custom-modal, .floating-panel').forEach(p=>p.style.display='none'); 
        document.getElementById('report-view').style.display = 'none';
    }

    function smartFormatDesc(text) {
        if (!text) return "";
        let html = "", isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim();
            if (!t) return;
            if (/<table|<tr|<td|<th|<\/table|<\/tr|<\/td|<\/th>/.test(t)) {
                html += t; isExample = false;
            } else if (t.startsWith('□')) {
                isExample = t.includes('예제') || t.includes('예시');
                html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`;
            } else if (isExample) {
                html += `<div class="example-box">${t}</div>`;
            } else {
                html += `<div class="desc-text">${t}</div>`;
            }
        });
        return html;
    }

    initApp();
</script>
</body>
</html>
